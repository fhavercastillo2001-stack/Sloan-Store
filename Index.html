<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sloan Store | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #121212;
            --accent-green: #00ff88;
            --gradient-violet: linear-gradient(90deg, #7000ff, #00ff88);
        }
        body { font-family: 'Rajdhani', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 15px; }

        /* Header y Menú */
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #222; }
        .logo { color: var(--accent-green); font-size: 1.5rem; font-weight: 700; text-transform: uppercase; }
        
        /* Botón de rayitas - Tamaño aumentado para que sea fácil tocarlo */
        .menu-btn { 
            cursor: pointer; 
            font-size: 2rem; 
            color: var(--accent-green); 
            background: none; 
            border: none; 
            padding: 5px 10px;
        }

        /* Menú Lateral - Corrección importante: Z-INDEX alto */
        .sidebar { 
            position: fixed; 
            right: -260px; 
            top: 0; 
            width: 250px; 
            height: 100%; 
            background: #0d0d0d; 
            border-left: 2px solid var(--accent-green); 
            transition: 0.3s ease; 
            z-index: 9999; 
            padding: 20px; 
        }
        .sidebar.active { right: 0; }

        /* Categoría y Tarjeta */
        .cat-title { color: var(--accent-green); font-size: 1.2rem; margin: 20px 0 10px; text-transform: uppercase; border-left: 3px solid var(--accent-green); padding-left: 10px; }
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .product-name { font-weight: 700; font-size: 1.2rem; }
        .price { color: var(--accent-green); font-size: 1.4rem; font-weight: 700; margin: 5px 0; }
        .btn-buy { background: var(--gradient-violet); color: white; border: none; width: 100%; padding: 10px; font-weight: 700; cursor: pointer; text-decoration: none; display: block; text-align: center; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">SLOAN STORE</div>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
</div>

<div class="sidebar" id="sidebar">
    <h2 style="color:var(--accent-green)">CATEGORÍAS</h2>
    <a href="#" style="color:white; display:block; padding:15px; text-decoration:none;">Keys Premium</a>
    <a href="#" style="color:white; display:block; padding:15px; text-decoration:none;">Bypass</a>
    <a href="#" style="color:white; display:block; padding:15px; text-decoration:none;">Soporte</a>
    <button onclick="toggleSidebar()" style="background:none; border:none; color:red; margin-top:20px; cursor:pointer; font-size: 1rem;">Cerrar Menú</button>
</div>

<div class="cat-title">Keys Premium</div>
<div class="card">
    <div class="product-name">DRIP CLIENT</div>
    <div class="price">$14.99</div>
    <a href="https://wa.me/584161995825" class="btn-buy">COMPRAR KEY</a>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('active');
    }
</script>

</body>
</html>
